<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Task Manager</h1>
      <p class="subtitle">Generated by Qwen 3.6 27B — MLX 6-bit</p>
    </header>

    <div class="add-task">
      <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
      <button id="add-btn" aria-label="Add task">+</button>
    </div>

    <div class="controls">
      <input type="text" id="search-input" placeholder="Search tasks..." aria-label="Search tasks">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </div>

    <div class="task-stats">
      <span id="task-count">0 tasks</span>
      <button id="clear-completed" class="secondary-btn">Clear completed</button>
    </div>

    <ul id="task-list" class="task-list"></ul>
  </div>

  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
